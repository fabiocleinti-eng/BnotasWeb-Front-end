<div class="dashboard-container">
  
  <div class="toast-notification" *ngIf="showToast">{{ toastMessage }}</div>

  <aside class="sidebar">
    <div class="sidebar-header">
      <h3>Minhas Notas</h3>
      <button class="btn-new-sidebar" (click)="createNote()">+ Nova</button>
    </div>

    <div class="search-box">
      <input type="text" placeholder="Buscar..." (input)="onSearch($event)">
    </div>

    <div class="notes-list-container">
      <div class="notes-list">
        <div 
          class="mini-postit" 
          *ngFor="let note of filteredNotes" 
          (click)="openNote(note)"
          [style.backgroundColor]="note.cor || '#fff9c4'"
        >
          <div class="delete-overlay" (click)="deleteFromSidebar($event, note)" title="Excluir">
            🗑️
          </div>

          <div class="mini-header">
            <span class="mini-title">{{ note.titulo || 'Sem título' }}</span>
            <span *ngIf="note.favorita" class="mini-star">★</span>
          </div>
          <div class="mini-content" [innerHTML]="note.conteudo | slice:0:40"></div>
          
          <div class="mini-date" *ngIf="note.dataCriacao">
            {{ note.dataCriacao | date:'dd/MM/yyyy' }}
          </div>
        </div>
      </div>
    </div>
  </aside>

  <main class="workspace">
    
    <div *ngIf="openNotes.length === 0" class="empty-workspace">
      <h2>Área de Trabalho</h2>
      <p>Clique em "+ Nova" ou selecione uma nota para editar.</p>
    </div>

    <div class="notes-grid">
      <div class="postit-card" 
           *ngFor="let note of openNotes; let i = index"
           [style.backgroundColor]="note.cor">
        
        <div class="postit-header">
          <input type="text" [(ngModel)]="note.titulo" placeholder="Título da Nota" class="postit-title-input">
          
          <div class="postit-actions">
            <button class="btn-icon" (click)="note.favorita = !note.favorita" [class.fav]="note.favorita" title="Favoritar">★</button>
            <button class="btn-icon close" (click)="closeNote(i)" title="Fechar">✕</button>
          </div>
        </div>

        <div class="editor-toolbar" (mousedown)="$event.preventDefault()">
          <button (click)="formatText('bold')" title="Negrito"><b>B</b></button>
          <button (click)="formatText('italic')" title="Itálico"><i>I</i></button>
          <button (click)="formatText('underline')" title="Sublinhado"><u>U</u></button>
          <div class="color-wrapper" title="Cor do Texto">
            <span style="font-weight:bold; color: #d32f2f;">A</span>
            <input type="color" (input)="formatText('foreColor', $any($event.target).value)">
          </div>
          <div class="color-wrapper" title="Marca Texto">
             <span style="background:yellow; font-weight:bold; padding:0 3px;">M</span>
             <input type="color" (input)="formatText('hiliteColor', $any($event.target).value)">
          </div>
        </div>

        <div 
          class="postit-content-editable" 
          contenteditable="true"
          [innerHTML]="note.conteudo"
          (blur)="updateContent($event, note)"
          placeholder="Escreva aqui..."
        ></div>

        <div class="postit-footer-column">
          
          <div class="colors-row">
             <div 
              *ngFor="let color of availableColors" 
              class="color-dot" 
              [style.backgroundColor]="color"
              (click)="changeNoteColor(note, color)"
              [class.selected]="note.cor === color"
              title="Mudar cor"
            ></div>
          </div>

          <div class="footer-bottom-row">
            <span class="date" *ngIf="note.dataCriacao">{{ note.dataCriacao | date:'dd/MM/yyyy' }}</span>
            <span class="date" *ngIf="!note.dataCriacao">Hoje</span>
            
            <div class="footer-btns">
              <button class="btn-icon-trash" (click)="deleteNote(note, i)" title="Excluir">🗑️</button>
              <button class="btn-mini save" (click)="saveNote(note)">Salvar</button>
            </div>
          </div>

        </div>

      </div>
    </div>

  </main>
</div>
