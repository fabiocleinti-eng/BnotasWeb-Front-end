<div class="login-container">

  <div *ngIf="isLoginMode" class="form-wrapper">
    <h2>Login BnotasWeb</h2>
    
    <form [formGroup]="loginForm" (ngSubmit)="onLoginSubmit()">
      
      <div class="form-group">
        <label for="login-email">Email:</label>
        <input id="login-email" type="email" formControlName="email" placeholder="seu@email.com">
        
        <div *ngIf="loginForm.get('email')?.invalid && loginForm.get('email')?.touched" class="error-validation">
          Email inválido.
        </div>
      </div>
      
      <div class="form-group">
        <label for="login-senha">Senha:</label>
        <input id="login-senha" type="password" formControlName="senha" placeholder="Sua senha">
      </div>
      
      <button type="submit" [disabled]="loginForm.invalid">Entrar</button>
    </form>
    
    <a (click)="toggleMode()">Não tem conta? Cadastre-se</a>
  </div>

  <div *ngIf="!isLoginMode" class="form-wrapper">
    <h2>Cadastro</h2>
    
    <form [formGroup]="registerForm" (ngSubmit)="onRegisterSubmit()">
      
      <div class="form-group">
        <label for="reg-email">Email:</label>
        <input id="reg-email" type="email" formControlName="email" placeholder="seu@email.com">
        <div *ngIf="registerForm.get('email')?.invalid && registerForm.get('email')?.touched" class="error-validation">
          Email inválido.
        </div>
      </div>
      
      <div class="form-group">
        <label for="reg-senha">Senha:</label>
        <input id="reg-senha" type="password" formControlName="senha" placeholder="Mínimo 6 caracteres">
        <div *ngIf="registerForm.get('senha')?.invalid && registerForm.get('senha')?.touched" class="error-validation">
          A senha deve ter pelo menos 6 caracteres.
        </div>
      </div>
      
      <button type="submit" [disabled]="registerForm.invalid">Criar Conta</button>
    </form>
    
    <a (click)="toggleMode()">Já tem conta? Faça o login</a>
  </div>

  <div *ngIf="errorMessage" class="error-api">
    {{ errorMessage }}
  </div>

</div>
